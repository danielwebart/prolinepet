# Apache vhost snippet to proxy /portalweb/* to Next.js at localhost:3000
# Enable required modules:
#   LoadModule proxy_module modules/mod_proxy.so
#   LoadModule proxy_http_module modules/mod_proxy_http.so
#   LoadModule rewrite_module modules/mod_rewrite.so

ProxyPreserveHost On
RewriteEngine On

# Proxy /portalweb to Next.js
RewriteRule ^/portalweb/(.*)$ http://127.0.0.1:3001/$1 [P,L]
ProxyPassReverse /portalweb http://127.0.0.1:3001/

# Optional: increase timeouts for long requests
ProxyTimeout 300

# Optional headers for websockets/upgrade (if used)
RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}
RequestHeader set X-Forwarded-Host expr=%{HTTP_HOST}
RequestHeader set X-Forwarded-Prefix "/portalweb"